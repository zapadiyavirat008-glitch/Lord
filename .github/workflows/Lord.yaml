name: Run CloudFront Scanner

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'  # Sirf workflow folder mein badlaav karne par hi trigger hoga
  schedule:
    - cron: '0 */6 * * *'       # Har 6 ghante mein automatic ek baar chalega
  workflow_dispatch:            # (Extra) Isse aapko GitHub par manually run karne ka button bhi mil jayega

# ZARURI PERMISSION: Iske bina GitHub database file ko save/write nahi karne dega
permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # Database push ke liye token verification hold rakhega

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate IP List
        run: |
          python3 -c "
          import ipaddress
          start = ipaddress.IPv4Address('56.175.1.1')
          end = ipaddress.IPv4Address('56.182.255.255')
          with open('ips.txt', 'w') as f:
              curr = start
              while curr <= end:
                  f.write(f'{curr}\n')
                  curr += 1
          "

      - name: Run Script in Continuous Loop
        env:
          # Aapke pehle se set kiye huye tokens ke naam bilkul same hain
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          while true; do
            echo "Starting fresh scan round..."
            python cf_finder.py hosts.txt ips.txt
            echo "Round finished. Waiting 30 seconds before next loop..."
            sleep 30
          done

      # EXTRA ADDED STEP: Yeh step har round ke baad live_database.json ko aapki repo mein push karega
      - name: Commit and Save Database Logs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Cloudflare State Database Auto-Update [Skip CI]"
          file_pattern: 'live_database.json'
